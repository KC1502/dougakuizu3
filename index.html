<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動画クイズ</title>

<style>
/* 共通スタイル - 元のコードを継承 */
body {
  font-family: sans-serif;
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  background-color: #e0f7fa;
  overflow-x: hidden;
}

/* --- スタート画面 --- */
#startContainer {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 20px;
  min-height: 100vh;
  box-sizing: border-box;
}

#startContainer h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

.rule-box {
  background: rgba(255, 255, 255, 0.7);
  padding: 20px;
  border-radius: 15px;
  display: inline-block;
  text-align: left;
  margin-bottom: 30px;
  line-height: 1.8;
  border: 1px solid #b2ebf2;
  max-width: 500px;
}

/* --- クイズ画面 --- */
#quizContainer {
  display: none; /* 初期は非表示 */
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-wrap: wrap;
}

/* サイドランキング */
#ranking { 
  width: 20%; 
  background: rgba(255, 255, 255, 0.5); 
  padding: 15px; 
  border-right: 1px solid #ddd;
  box-sizing: border-box;
}
#ranking h3 { border-bottom: 2px solid #333; padding-bottom: 5px; font-size: 18px; }
.side-rank-item { font-size: 14px; margin: 8px 0; border-bottom: 1px solid #ccc; padding-bottom: 4px; }

/* メインエリア */
#main { 
  width: 60%; 
  text-align: center; 
  padding: 20px;
  box-sizing: border-box;
}
#side { width: 20%; }

#qNum {
  display: inline-block;
  background: #333;
  color: #fff;
  padding: 5px 15px;
  border-radius: 20px;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 15px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.q-header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

#qText {
  font-size: 32px;
  font-weight: bold;
  color: #333;
  margin: 0;
}

#timers { 
  display: flex;
  gap: 20px;
  font-weight: bold;
  font-size: 28px;
  background: rgba(255, 255, 255, 0.7);
  padding: 10px 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.timer-item { display: flex; flex-direction: column; min-width: 100px; }
.timer-label { font-size: 12px; color: #666; margin-bottom: -2px; }
.red { color: #ff0000; }

#player { margin: 0 auto; width: 100% !important; max-width: 640px; aspect-ratio: 16/9; }

input[type="text"] { 
  padding: 12px; 
  width: 80%; 
  max-width: 400px; 
  margin-top: 20px; 
  font-size: 18px; 
  border-radius: 8px; 
  border: 1px solid #ccc; 
}

#actionBtn { 
  padding: 12px 24px; 
  margin-top: 8px;
  font-size: 18px; 
  cursor: pointer; 
  border-radius: 8px; 
  background: #fff; 
  border: 2px solid #333; 
}

#feedback { margin-top: 10px; font-weight: bold; font-size: 24px; min-height: 1.2em; }

/* スマホ対応 */
@media (max-width: 1000px) { #main { width: 80%; } }
@media (max-width: 768px) {
  #quizContainer { flex-direction: column; }
  #ranking { width: 100%; order: 3; border-right: none; border-top: 2px solid #ddd; }
  #main { width: 100%; order: 1; padding: 10px; }
  #side { display: none; }
  .q-header { gap: 10px; }
  #qText { font-size: 24px; width: 100%; }
  #timers { font-size: 22px; gap: 15px; width: 100%; justify-content: center; }
  #qNum { font-size: 18px; }
}
</style>
</head>

<body>

<div id="startContainer">
  <h1>動画クイズ</h1>
  <div class="rule-box">
    <b>【ルール説明】</b><br>
    ・動画を見て答えを入力してください。<br>
    ・<b>動画を再生するとタイマーが始まります。</b><br>
    ・制限時間は各問25秒です。<br>
    ・<b>全国ランキングを共有中！</b>
  </div>
  <input type="text" id="usernameInput" placeholder="ユーザーネームを入れてね">
  <button onclick="startQuiz()" style="margin-top: 40px; padding: 12px 24px; font-size: 18px; cursor: pointer;">クイズを開始する</button>
</div>

<div id="quizContainer" style="display: none;">
  <div id="ranking">
    <h3>🏆 世界 TOP5</h3>
    <div id="rankingList">読み込み中...</div>
  </div>

  <div id="main">
    <div id="qNum">第 1 問 / 5</div>
    <div class="q-header">
      <div id="qText"></div>
      <div id="timers">
        <div class="timer-item"><span class="timer-label">経過時間</span><span id="countUp">0.00</span></div>
        <div class="timer-item"><span class="timer-label">残り時間</span><span id="countDown">25.00</span></div>
      </div>
    </div>
    <div id="player"></div>
    <input type="text" id="answer" placeholder="答えを入力">
    <div id="feedback"></div>
    <button id="actionBtn" onclick="handleButton()">回答する</button>
  </div>
  <div id="side"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxrkorXMuGcKqVAMxtvyizrqbNGnojszmN3ccs5SoVj0-ZrcXjwTrDOUU9HELzHLRopOg/exec";

let username = "";
let player;
let current = 0;
let score = 0;
let totalTime = 0;
let timerInterval = null;
let isTimerRunning = false;
let startTime = 0;
let elapsed = 0;
let isAnswered = false;

const questions = [
  { text: "第一問：このキャラの名前は？", video:"PYjMgqRCbFk", answers:["エコぴょん","えこぴょん","エコピョン"] },
  { text: "第二問：この人の名前は？", video:"qJXqX1q3c-A", answers:["優","松澤　優","松澤","ゆう","ゆっちゃん","松澤優"] },
  { text: "第三問：このアニメの名前は？", video:"KqJmTMPGG3A", answers:["銀魂","ぎんたま"] },
  { text: "第四問：この生き物の名前は？", video:"mnjo5raE5WM", answers:["ケンタウルス"] },
  { text: "第五問：この人の名前は？", video:"plp4CJ-Ri8c", answers:["わか","若杉","わかさん","若杉　亮太朗","わか。"] }
];

async function updateSideRanking() {
  const listElement = document.getElementById("rankingList");
  try {
    const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({type: "get"}) });
    const rankings = await response.json();
    listElement.innerHTML = rankings.map((r, i) => `
      <div class="side-rank-item">
        <b>${i+1}位</b>: ${r.name}<br>
        ${r.score}点 (${parseFloat(r.time).toFixed(1)}s)
      </div>
    `).join("");
  } catch (e) { listElement.innerHTML = "データ取得待ち..."; }
}

function startQuiz() {
  const name = document.getElementById("usernameInput").value.trim();
  if (!name) { alert("名前を入力してください！"); return; }
  username = name;
  document.getElementById("startContainer").style.display = "none";
  document.getElementById("quizContainer").style.display = "flex";
  updateSideRanking();
  loadQuestion();
}

function loadQuestion() {
  if (player) player.destroy();
  player = new YT.Player('player', {
    height: '360', width: '100%',
    videoId: questions[current].video,
    playerVars: { 'playsinline': 1 },
    events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.PLAYING) startTimer(); } }
  });
  document.getElementById("qText").innerText = questions[current].text;
  document.getElementById("qNum").innerText = `第 ${current+1} 問 / 全 5 問`;
  document.getElementById("countUp").innerText = "0.00";
  document.getElementById("countDown").innerText = "25.00";
  document.getElementById("answer").value = "";
  document.getElementById("answer").disabled = false;
  document.getElementById("feedback").innerText = "";
  document.getElementById("actionBtn").innerText = "回答する";
  isAnswered = false;
  elapsed = 0;
  stopTimer();
}

function startTimer() {
  if (isTimerRunning) return;
  isTimerRunning = true;
  startTime = Date.now();
  timerInterval = setInterval(() => {
    elapsed = (Date.now() - startTime) / 1000;
    const remaining = Math.max(0, 25 - elapsed);
    document.getElementById("countUp").innerText = elapsed.toFixed(2);
    document.getElementById("countDown").innerText = remaining.toFixed(2);
    if (remaining <= 5) document.getElementById("countDown").classList.add("red");
    if (remaining <= 0) { stopTimer(); totalTime += 25; submitAnswer(true); }
  }, 10);
}

function stopTimer() { clearInterval(timerInterval); isTimerRunning = false; }

function handleButton() {
  if (!isAnswered) submitAnswer();
  else nextQuestion();
}

function submitAnswer(timeUp = false) {
  if (isAnswered) return;
  isAnswered = true;
  stopTimer();
  if (!timeUp) totalTime += elapsed;
  const userAnswer = document.getElementById("answer").value.trim().toLowerCase();
  const correctList = questions[current].answers.map(a => a.toLowerCase());
  const isCorrect = correctList.includes(userAnswer);
  const feedback = document.getElementById("feedback");
  if (timeUp) {
    feedback.innerText = `時間切れ！正解は「${questions[current].answers[0]}」`;
    feedback.style.color = "blue";
  } else if (isCorrect) {
    score++;
    feedback.innerText = "正解！おめでとう！";
    feedback.style.color = "red";
  } else {
    feedback.innerText = `残念！正解は「${questions[current].answers[0]}」`;
    feedback.style.color = "blue";
  }
  document.getElementById("answer").disabled = true;
  document.getElementById("actionBtn").innerText = "次の問題へ進む";
}

function nextQuestion() {
  current++;
  if (current < questions.length) loadQuestion();
  else finishQuiz();
}

async function finishQuiz() {
  document.body.innerHTML = `<div style="text-align:center; padding-top:100px;"><h2>結果を集計中...</h2></div>`;
  try {
    const response = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ name: username, score: score, time: totalTime })
    });
    const rankings = await response.json();
    showFinalResult(rankings);
  } catch (e) { location.reload(); }
}

function showFinalResult(rankings) {
  // 元のコードの大きな文字サイズと装飾を再現
  let rankingHTML = rankings.map((r, i) => `
    <div style="font-size: 24px; margin: 15px 0; border-bottom: 1px dashed #ccc; text-align:left; padding: 10px; background: white; border-radius: 8px;">
      ${(i<3)?["🥇","🥈","🥉"][i]:""}<b>${i+1}位</b>: ${r.name} 
      <span style="color:red; font-weight:bold; float:right;">${r.score}点</span>
      <div style="font-size: 16px; color: #666;">タイム: ${parseFloat(r.time).toFixed(2)}秒</div>
    </div>`).join("");

  document.body.innerHTML = `
    <div style="width: 100%; text-align: center; padding: 40px 10px; background-color: #e0f7fa; min-height: 100vh; box-sizing: border-box;">
      <h2 style="font-size: 50px; margin-bottom: 10px;">結果発表</h2>
      <p style="font-size: 30px; font-weight:bold; margin-top:0;">${username} さん</p>
      <div style="font-size: 36px; color:red; font-weight:bold; margin-bottom: 20px;">
        スコア: ${score} / 5
      </div>
      <div style="background: rgba(255,255,255,0.8); display: inline-block; padding: 20px; border-radius: 20px; text-align: left; width: 95%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h3 style="text-align:center; font-size:24px; border-bottom:3px solid #e0f7fa;">🏆 スプレッドシート TOP5 🏆</h3>
        ${rankingHTML}
      </div>
      <br>
      <button onclick="location.reload()" style="margin-top:30px; font-size:20px; padding:15px 30px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer;">タイトルに戻って再挑戦</button>
    </div>`;
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (document.getElementById("startContainer").style.display !== "none") startQuiz();
    else handleButton();
  }
});
</script>
</body>
</html>
